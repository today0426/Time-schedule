<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 진도 체크판</title>
<style>
  :root {
    --ink: #1f2733;
    --muted: #6b7684;
    --line: #e3e8ef;
    --bg: #f5f7fa;
    --card: #ffffff;
    --accent: #2f6fed;
    --accent-soft: #e8f0fe;
    --common: #2f6fed;
    --general: #16a394;
    --career: #e0892b;
    --fusion: #8b5cf6;
    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5; -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 16px 60px; }
  header { margin-bottom: 20px; }
  .title { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
  .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .subject-name { color: var(--accent); }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .panel h2 { font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; margin-bottom: 12px; }
  .subjects { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { border: 1px solid var(--line); background: #fff; border-radius: 999px;
    padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform .05s ease, box-shadow .1s ease; color: var(--ink); }
  .chip:hover { box-shadow: var(--shadow); }
  .chip:active { transform: scale(.97); }
  .chip .tag { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 7px; vertical-align: middle; }
  .chip.sel { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .tag.common { background: var(--common); } .tag.general { background: var(--general); }
  .tag.career { background: var(--career); } .tag.fusion { background: var(--fusion); }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; font-size: 12px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; }
  .legend i { width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; display: inline-block; }
  .classes { display: flex; flex-wrap: wrap; gap: 8px; }
  .cls-btn { border: 1px solid var(--line); background: #fff; border-radius: 8px;
    padding: 7px 12px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--muted); }
  .cls-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 10px; }
  .hint b { color: var(--accent); }
  .grid-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 620px; background: var(--card); }
  th, td { border: 1px solid var(--line); text-align: center; }
  th { background: #f0f3f7; font-size: 13px; font-weight: 700; color: var(--muted); padding: 10px 4px; }
  .period-col { width: 64px; background: #f0f3f7; font-size: 12px; font-weight: 700; color: var(--muted); }
  td.cell { height: 70px; cursor: pointer; padding: 4px; vertical-align: top; position: relative; transition: background .1s ease; }
  td.cell:hover { background: #f7f9fc; }
  .blk { border-radius: 7px; padding: 5px 6px; height: 100%; text-align: left;
    display: flex; flex-direction: column; gap: 3px; color: #fff; }
  .blk.common { background: var(--common); } .blk.general { background: var(--general); }
  .blk.career { background: var(--career); }
  .blk.fusion { background: var(--fusion); border: 2px dashed rgba(255,255,255,.6); }
  .blk .nm { font-size: 12px; font-weight: 700; line-height: 1.2; }
  .blk .cls { font-size: 11px; opacity: .95; font-weight: 600; }
  .blk .memo { font-size: 10px; opacity: .9; line-height: 1.2; margin-top: auto;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .blk .check { font-size: 10px; font-weight: 700; }
  .placer-active td.cell:not(.filled):hover {
    background: var(--accent-soft); outline: 2px solid var(--accent); outline-offset: -2px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(16,24,40,.45);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 22px; width: 100%; max-width: 420px;
    box-shadow: 0 20px 40px rgba(16,24,40,.2); }
  .modal h3 { font-size: 18px; font-weight: 800; }
  .modal .msub { font-size: 13px; color: var(--muted); margin: 2px 0 16px; }
  .modal label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .modal textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px;
    font-size: 14px; font-family: inherit; resize: vertical; min-height: 56px; margin-top: 6px; }
  .modal textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .modal .classes { margin-top: 8px; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn { flex: 1; border: none; border-radius: 10px; padding: 11px; font-size: 14px;
    font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: #f0f3f7; color: var(--ink); }
  .btn-danger { background: #fff; color: #dc2626; border: 1px solid #f3c4c4; flex: 0 0 auto; padding: 11px 14px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
  .save-state { font-size: 12px; color: var(--muted); }
  .reset { background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .reset:hover { border-color: #dc2626; color: #dc2626; }
  @media (max-width: 600px) { .title { font-size: 20px; } td.cell { height: 62px; } }
</style>
</head>
<body>
<div class="wrap">

  <!--
  ════════════════════════════════════════════════════════════════
   ▼▼▼  여기만 내 과목으로 바꾸면 됩니다  ▼▼▼
  ════════════════════════════════════════════════════════════════
   - 교과명: 화면 제목에 표시됩니다
   - 과목들: { 이름, 유형 } 목록. 유형은 common(공통)/general(일반선택)
            /career(진로선택)/fusion(융합선택) 중 하나 (색이 달라집니다)
   - 담당학급: 내가 그 교과를 가르치는 반들
   ※ 아래 '전 교과 과목 목록' 주석에서 내 교과 부분을 복사해 쓰면 편합니다.
  ════════════════════════════════════════════════════════════════
  -->
  <script>
  const MY = {
    교과명: "체육",
    과목들: [
      { 이름: "체육1",        유형: "general" },
      { 이름: "체육2",        유형: "general" },
      { 이름: "운동과 건강",   유형: "career" },
      { 이름: "스포츠 문화",   유형: "career" },
      { 이름: "스포츠 과학",   유형: "career" },
      { 이름: "스포츠 생활1",  유형: "fusion" },
      { 이름: "스포츠 생활2",  유형: "fusion" },
    ],
    담당학급: ["1-1", "1-2", "1-3", "1-4", "1-5", "1-6"],
  };
  /*
  ════════════════════════════════════════════════════════════════
   ▲▲▲  바꾸는 곳은 위까지입니다  ▲▲▲
  ════════════════════════════════════════════════════════════════
   2022 개정 교육과정 고등학교 보통교과 — 내 교과 부분 복사용
   유형: common 공통 / general 일반선택 / career 진로선택 / fusion 융합선택

   ◎ 국어
     공통:    공통국어1, 공통국어2
     일반선택: 화법과 언어, 독서와 작문, 문학
     진로선택: 주제 탐구 독서, 문학과 영상, 직무 의사소통
     융합선택: 독서 토론과 글쓰기, 매체 의사소통, 언어생활 탐구
   ◎ 수학
     공통:    공통수학1, 공통수학2 (기초: 기본수학1, 기본수학2)
     일반선택: 대수, 미적분Ⅰ, 확률과 통계
     진로선택: 미적분Ⅱ, 기하, 경제 수학, 인공지능 수학, 직무 수학
     융합선택: 수학과 문화, 실용 통계, 수학과제 탐구
   ◎ 영어
     공통:    공통영어1, 공통영어2 (기초: 기본영어1, 기본영어2)
     일반선택: 영어Ⅰ, 영어Ⅱ, 영어 독해와 작문
     진로선택: 영미 문학 읽기, 영어 발표와 토론, 직무 영어, 심화 영어, 심화 영어 독해와 작문
     융합선택: 실생활 영어 회화, 미디어 영어, 세계 문화와 영어
   ◎ 사회 (역사/도덕 포함)
     공통:    한국사1, 한국사2, 통합사회1, 통합사회2
     일반선택: 세계시민과 지리, 세계사, 사회와 문화, 현대사회와 윤리
     진로선택: 한국지리 탐구, 도시의 미래 탐구, 동아시아 역사 기행, 정치, 법과 사회,
              경제, 윤리와 사상, 인문학과 윤리, 국제 관계의 이해
     융합선택: 여행지리, 역사로 탐구하는 현대 세계, 사회문제 탐구,
              금융과 경제생활, 윤리문제 탐구, 기후변화와 지속가능한 세계
   ◎ 과학
     공통:    통합과학1, 통합과학2, 과학탐구실험1, 과학탐구실험2
     일반선택: 물리학, 화학, 생명과학, 지구과학
     진로선택: 역학과 에너지, 전자기와 양자, 물질과 에너지, 화학 반응의 세계,
              세포와 물질대사, 생물의 유전, 지구시스템과학, 행성우주과학
     융합선택: 과학의 역사와 문화, 기후변화와 환경생태, 융합과학 탐구
   ◎ 체육  ← (현재 기본값)
     일반선택: 체육1, 체육2
     진로선택: 운동과 건강, 스포츠 문화, 스포츠 과학
     융합선택: 스포츠 생활1, 스포츠 생활2
   ◎ 예술 (음악/미술)
     일반선택: 음악, 미술, 연극
     진로선택: 음악 연주와 창작, 음악 감상과 비평, 미술 창작, 미술 감상과 비평
     융합선택: 음악과 미디어, 미술과 매체
   ◎ 기술·가정 / 정보
     일반선택: 기술·가정, 정보
     진로선택: 로봇과 공학세계, 생활과학 탐구, 인공지능 기초, 데이터 과학
     융합선택: 창의 공학 설계, 지식 재산 일반, 생애 설계와 자립, 아동발달과 부모
   ◎ 제2외국어 / 한문
     일반선택: 독일어, 프랑스어, 스페인어, 중국어, 일본어, 러시아어, 아랍어, 베트남어, 한문
     진로선택: 심화(해당 언어), 한문 고전 읽기
     융합선택: (해당 언어권) 문화, 언어생활과 한자
   ◎ 교양
     일반선택: 진로와 직업, 생태와 환경
     진로선택: 인간과 철학, 논리와 사고, 인간과 심리, 교육의 이해, 삶과 종교, 보건
     융합선택: 인간과 경제활동, 논술
  ════════════════════════════════════════════════════════════════
  */
  </script>

  <header>
    <div class="title"><span class="subject-name" id="hdrName">체육</span> 주간 진도 체크판</div>
    <div class="subtitle">과목을 고르고 담당 학급을 체크한 뒤, 시간표 칸을 눌러 배치하세요.</div>
  </header>

  <div class="panel">
    <h2>1. 과목 선택</h2>
    <div class="subjects" id="subjectList"></div>
    <div class="legend">
      <span><i style="background:var(--common)"></i>공통</span>
      <span><i style="background:var(--general)"></i>일반선택</span>
      <span><i style="background:var(--career)"></i>진로선택</span>
      <span><i style="background:var(--fusion)"></i>융합선택</span>
    </div>
  </div>

  <div class="panel" id="classPanel" style="display:none;">
    <h2>2. <span id="selSubjectName"></span> — 담당 학급 선택</h2>
    <div class="classes" id="classList"></div>
    <div class="hint" id="placeHint"></div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <h2 style="margin:0;">3. 주간 시간표</h2>
      <div style="display:flex;gap:10px;align-items:center;">
        <span class="save-state" id="saveState">자동 저장됨</span>
        <button class="reset" id="resetBtn">전체 초기화</button>
      </div>
    </div>
    <div class="grid-wrap"><table id="grid"></table></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="mTitle">진도 기록</h3>
    <div class="msub" id="mSub"></div>
    <label>오늘 진도 나간 학급</label>
    <div class="classes" id="mClasses"></div>
    <label style="display:block;margin-top:14px;">진도 내용</label>
    <textarea id="mMemo" placeholder="예: 3단원 배구 언더토스 / 평가 안내"></textarea>
    <div class="modal-actions">
      <button class="btn btn-danger" id="mDelete">삭제</button>
      <button class="btn btn-ghost" id="mCancel">취소</button>
      <button class="btn btn-primary" id="mSave">저장</button>
    </div>
  </div>
</div>

<script>
(function () {
  const DAYS = ["월", "화", "수", "목", "금"];
  const PERIODS = [1, 2, 3, 4, 5, 6, 7];
  const STORE_KEY = "progress-board-" + MY.교과명;
  let picked = null, pickedClasses = [], board = load(), editingKey = null;

  function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { return {}; } }
  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(board));
    const el = document.getElementById("saveState");
    el.textContent = "저장됨 ✓"; setTimeout(() => (el.textContent = "자동 저장됨"), 1200);
  }

  document.getElementById("hdrName").textContent = MY.교과명;

  const subjectList = document.getElementById("subjectList");
  MY.과목들.forEach((sub, i) => {
    const b = document.createElement("button");
    b.className = "chip";
    b.innerHTML = '<span class="tag ' + sub.유형 + '"></span>' + sub.이름;
    b.onclick = () => selectSubject(i, b);
    subjectList.appendChild(b);
  });

  function selectSubject(i, btn) {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("sel"));
    btn.classList.add("sel");
    const sub = MY.과목들[i];
    picked = { 이름: sub.이름, 유형: sub.유형 }; pickedClasses = [];
    document.getElementById("classPanel").style.display = "block";
    document.getElementById("selSubjectName").textContent = sub.이름;
    renderClassPicker(); updateHint();
    document.body.classList.add("placer-active");
  }

  function renderClassPicker() {
    const wrap = document.getElementById("classList"); wrap.innerHTML = "";
    MY.담당학급.forEach(cls => {
      const b = document.createElement("button");
      b.className = "cls-btn"; b.textContent = cls;
      b.onclick = () => {
        if (pickedClasses.includes(cls)) { pickedClasses = pickedClasses.filter(c => c !== cls); b.classList.remove("on"); }
        else { pickedClasses.push(cls); b.classList.add("on"); }
        updateHint();
      };
      wrap.appendChild(b);
    });
  }

  function updateHint() {
    const h = document.getElementById("placeHint");
    if (!picked) { h.innerHTML = ""; return; }
    if (pickedClasses.length === 0) h.innerHTML = "담당 학급을 하나 이상 체크한 뒤, <b>시간표 빈 칸</b>을 클릭하세요.";
    else h.innerHTML = "<b>" + picked.이름 + "</b> (" + pickedClasses.join(", ") + ") 준비됨 → 이제 <b>시간표 빈 칸</b>을 클릭해 배치하세요.";
  }

  function renderGrid() {
    const t = document.getElementById("grid"); t.innerHTML = "";
    const hr = document.createElement("tr");
    hr.innerHTML = "<th class='period-col'>교시</th>" + DAYS.map(d => "<th>" + d + "</th>").join("");
    t.appendChild(hr);
    PERIODS.forEach(p => {
      const tr = document.createElement("tr");
      const pc = document.createElement("td");
      pc.className = "period-col"; pc.textContent = p + "교시"; tr.appendChild(pc);
      DAYS.forEach((d, di) => {
        const key = di + "-" + p;
        const td = document.createElement("td"); td.className = "cell";
        const data = board[key];
        if (data) {
          td.classList.add("filled");
          const doneTxt = data.done && data.done.length ? "✓ " + data.done.join(", ") : "기록 전";
          td.innerHTML = '<div class="blk ' + data.type + '">' +
            '<div class="nm">' + data.name + '</div>' +
            '<div class="cls">' + data.classes.join(", ") + '</div>' +
            (data.memo ? '<div class="memo">' + escapeHtml(data.memo) + '</div>' : '') +
            '<div class="check">' + doneTxt + '</div></div>';
          td.onclick = () => openModal(key);
        } else {
          td.onclick = () => placeAt(key);
        }
        tr.appendChild(td);
      });
      t.appendChild(tr);
    });
  }

  function placeAt(key) {
    if (!picked) { alert("먼저 위에서 과목을 선택하세요."); return; }
    if (pickedClasses.length === 0) { alert("담당 학급을 하나 이상 체크하세요."); return; }
    board[key] = { name: picked.이름, type: picked.유형, classes: pickedClasses.slice(), done: [], memo: "" };
    save(); renderGrid();
  }

  function openModal(key) {
    editingKey = key; const data = board[key];
    document.getElementById("mTitle").textContent = data.name;
    document.getElementById("mSub").textContent = "담당 학급: " + data.classes.join(", ");
    const mc = document.getElementById("mClasses"); mc.innerHTML = "";
    data.classes.forEach(cls => {
      const b = document.createElement("button");
      b.className = "cls-btn" + (data.done.includes(cls) ? " on" : "");
      b.textContent = cls; b.dataset.cls = cls;
      b.onclick = () => b.classList.toggle("on");
      mc.appendChild(b);
    });
    document.getElementById("mMemo").value = data.memo || "";
    document.getElementById("modalBg").classList.add("show");
  }
  function closeModal() { document.getElementById("modalBg").classList.remove("show"); editingKey = null; }

  document.getElementById("mSave").onclick = () => {
    const data = board[editingKey]; const done = [];
    document.querySelectorAll("#mClasses .cls-btn.on").forEach(b => done.push(b.dataset.cls));
    data.done = done; data.memo = document.getElementById("mMemo").value.trim();
    save(); renderGrid(); closeModal();
  };
  document.getElementById("mDelete").onclick = () => {
    if (confirm("이 칸을 비울까요?")) { delete board[editingKey]; save(); renderGrid(); closeModal(); }
  };
  document.getElementById("mCancel").onclick = closeModal;
  document.getElementById("modalBg").onclick = (e) => { if (e.target.id === "modalBg") closeModal(); };
  document.getElementById("resetBtn").onclick = () => {
    if (confirm("시간표를 모두 비울까요? 되돌릴 수 없습니다.")) { board = {}; save(); renderGrid(); }
  };
  function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  renderGrid();
})();
</script>
</body>
</html>
